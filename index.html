<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#0a1628"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="J_LAB"/>
  <meta name="description" content="J_LAB 회원관리 시스템"/>
  <title>J_LAB 회원관리</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="stylesheet" href="style_additions.css"/>
</head>
<body>

<div id="app">

  <!-- ══ SIDEBAR ══ -->
  <nav id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo" id="brandLogoText">J</div>
      <div>
        <div class="brand-name" id="brandOrgName">J_LAB</div>
        <div class="brand-sub" id="brandOrgSub">회원관리 시스템</div>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <ul class="sidebar-nav" id="sidebarNav">
      <li><button class="nav-item active" data-page="dashboard">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
        <span class="nav-label">대시보드</span>
      </button></li>
      <li><button class="nav-item" data-page="members">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
        <span class="nav-label">회원관리</span>
      </button></li>
      <li><button class="nav-item" data-page="fees">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
        <span class="nav-label">회비관리</span>
      </button></li>
      <li><button class="nav-item" data-page="events">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
        <span class="nav-label">행사관리</span>
      </button></li>
      <li><button class="nav-item" data-page="unpaid">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
        <span class="nav-label">회비 미납 현황</span>
      </button></li>
    </ul>
    <div class="sidebar-footer">
      <div class="sync-status">
        <span class="sync-dot"></span>
        <span class="sync-text" id="syncText">연결 중...</span>
      </div>
      <span class="version-badge">v4.5</span>
    </div>
  </nav>

  <!-- ══ MAIN WRAP ══ -->
  <div id="mainWrap">

    <!-- 헤더 -->
    <header id="header">
      <button id="menuToggle" class="menu-toggle" aria-label="메뉴 열기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="22" height="22">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="header-title-wrap">
        <h1 class="header-title" id="pageTitle">대시보드</h1>
        <span class="header-bc" id="pageBc">홈 / 대시보드</span>
      </div>
      <div class="header-right">
        <button id="btnRefresh" class="hdr-btn" title="새로고침">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
          </svg>
        </button>
        <div class="org-pill" id="headerOrgPill">J_LAB</div>
      </div>
    </header>

    <!-- 콘텐츠 영역 -->
    <main id="content">
      <div class="pg-loading">
        <div class="pg-spinner"></div>
        <p class="pg-loading-txt">초기화 중...</p>
      </div>
    </main>

  </div><!-- /#mainWrap -->

  <!-- 모바일 사이드바 오버레이 -->
  <div id="sidebarOverlay"></div>

  <!-- ══ 하단 탭바 (모바일) ══ -->
  <nav id="bottomNav">
    <button class="bnav-item active" data-page="dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>대시보드</span>
    </button>
    <button class="bnav-item" data-page="members">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      <span>회원</span>
    </button>
    <button class="bnav-item" data-page="fees">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span>회비</span>
    </button>
    <button class="bnav-item" data-page="events">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span>행사</span>
    </button>
    <button class="bnav-item" data-page="unpaid">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/></svg>
      <span>미납</span>
    </button>
  </nav>

</div><!-- /#app -->

<!-- ══ 회원 상세 모달 ══ -->
<div id="modalOverlay" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-hdr">
      <div class="modal-hdr-left">
        <div class="modal-avatar" id="modalAvatar">J</div>
        <div>
          <div class="modal-name" id="modalName">—</div>
          <div class="modal-meta" id="modalMeta">—</div>
        </div>
      </div>
      <button class="modal-close" id="modalClose" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ══ 찬조 감사 문구 등록 모달 ══ -->
<div id="sponsorModalOverlay" role="dialog" aria-modal="true">
  <div id="sponsorModal">
    <div class="spon-modal-hdr">
      <div class="spon-modal-title">🎉 찬조 감사 문구 등록</div>
      <button class="modal-close" id="sponsorModalClose" aria-label="닫기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="spon-modal-body">
      <!-- 행사 선택 -->
      <div class="spon-form-group">
        <label class="spon-form-label">관련 행사 (선택)</label>
        <select id="sponEventSelect"><option value="">행사 없음 (전체 공지)</option></select>
      </div>
      <!-- 찬조자 정보 -->
      <div class="spon-form-row">
        <div class="spon-form-group">
          <label class="spon-form-label">찬조자명 *</label>
          <input id="sponName" type="text" placeholder="예: 김철수"/>
        </div>
        <div class="spon-form-group">
          <label class="spon-form-label">기수</label>
          <input id="sponGeneration" type="text" placeholder="예: 12"/>
        </div>
      </div>
      <!-- 찬조 유형 / 금액 -->
      <div class="spon-form-row">
        <div class="spon-form-group">
          <label class="spon-form-label">찬조 유형</label>
          <select id="sponType">
            <option value="찬조금">💰 찬조금</option>
            <option value="물품">📦 물품</option>
            <option value="식사">🍽 식사</option>
            <option value="경품">🎁 경품</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="spon-form-group">
          <label class="spon-form-label">금액 (선택)</label>
          <input id="sponAmount" type="text" placeholder="예: 300,000"/>
        </div>
      </div>
      <!-- 전광판 문구 -->
      <div class="spon-form-group">
        <label class="spon-form-label">전광판 표시 문구 *</label>
        <textarea id="sponMessage" placeholder="예: 🎉 스승의날 골프대회에 12기 김철수 원우님께서 찬조금 300,000원을 후원해 주셨습니다. 진심으로 감사드립니다."></textarea>
      </div>
    </div>
    <div class="spon-modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeSponsorModal()">취소</button>
      <button class="btn btn-gold btn-sm" id="sponSaveBtn" onclick="saveSponsorForm()">🎉 등록</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" role="alert" aria-live="polite"></div>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
</html>
